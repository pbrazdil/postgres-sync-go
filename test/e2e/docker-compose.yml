services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: postgres_sync_go
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    ports:
      - "127.0.0.1:${DB_PORT:-45432}:5432"
    volumes:
      - e2e-postgres-data:/var/lib/postgresql
      - ./seed.sql:/docker-entrypoint-initdb.d/010-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-sync-go:
    image: postgres-sync-go:local
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/postgres_sync_go?sslmode=disable
      SYNC_POOLED_DATABASE_URL: postgresql://postgres:password@postgres:5432/postgres_sync_go?sslmode=disable
      SYNC_SECRET: ${SECRET:-test-secret}
      SYNC_PORT: 3100
      SYNC_REPLICATION_STREAM_ID: ${SYNC_GO_STREAM_ID:-syncgocmp}
      SYNC_STORAGE_MODE: ${SYNC_GO_STORAGE_MODE:-memory}
      SYNC_STORAGE_DIR: ${SYNC_GO_STORAGE_DIR:-/var/lib/postgres-sync-go}
      SYNC_MAX_CONCURRENT_REQUESTS: '${SCENARIO_MAX_CONCURRENT_REQUESTS:-{"initial":300,"existing":10000}}'
      SYNC_LONG_POLL_TIMEOUT_MS: ${SCENARIO_LONG_POLL_TIMEOUT_MS:-20000}
      SYNC_SSE_TIMEOUT_MS: ${SCENARIO_SSE_TIMEOUT_MS:-60000}
      SYNC_FEATURE_FLAGS: ${SCENARIO_FEATURE_FLAGS:-}
    ports:
      - "127.0.0.1:${SYNC_GO_PORT:-43100}:3100"
    volumes:
      - ${SYNC_GO_STORAGE_BIND_DIR:-./_runtime/postgres-sync-go-storage}:${SYNC_GO_STORAGE_DIR:-/var/lib/postgres-sync-go}

  electric:
    build:
      context: ${COMPARE_SYNC_DIR:-.}
      dockerfile: Dockerfile
      additional_contexts:
        electric-telemetry: ${COMPARE_TELEMETRY_DIR:-.}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/postgres_sync_go?sslmode=disable
      ELECTRIC_POOLED_DATABASE_URL: postgresql://postgres:password@postgres:5432/postgres_sync_go?sslmode=disable
      ELECTRIC_SECRET: ${SECRET:-test-secret}
      ELECTRIC_INSECURE: "false"
      ELECTRIC_LOG_LEVEL: debug
      ELECTRIC_PORT: 3000
      ELECTRIC_REPLICATION_STREAM_ID: ${COMPARE_STREAM_ID:-electriccmp}
      ELECTRIC_MAX_CONCURRENT_REQUESTS: '${SCENARIO_MAX_CONCURRENT_REQUESTS:-{"initial":300,"existing":10000}}'
      ELECTRIC_LONG_POLL_TIMEOUT_MS: ${SCENARIO_LONG_POLL_TIMEOUT_MS:-20000}
      ELECTRIC_SSE_TIMEOUT_MS: ${SCENARIO_SSE_TIMEOUT_MS:-60000}
      ELECTRIC_FEATURE_FLAGS: ${SCENARIO_FEATURE_FLAGS:-}
      CLEANUP_REPLICATION_SLOTS_ON_SHUTDOWN: "true"
    ports:
      - "127.0.0.1:${COMPARE_PORT:-43200}:3000"

volumes:
  e2e-postgres-data:

name: Feature request
description: Suggest a capability, compatibility improvement, or operational hardening item.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or workflow problem should this solve?
      placeholder: I need postgres-sync-go to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you want.
      placeholder: Add support for ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternate designs have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - HTTP protocol compatibility
        - Replication/runtime
        - Shape state and diffing
        - Storage/recovery
        - Docker/packaging
        - Observability
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues for similar requests.
          required: true
